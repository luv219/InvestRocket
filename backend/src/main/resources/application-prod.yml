server:
  shutdown: graceful
  forward-headers-strategy: framework
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

spring:
  lifecycle:
    timeout-per-shutdown-phase: 20s
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

app:
  cors:
    allowed-origin: ${FRONTEND_URL}
  admin-bootstrap:
    enabled: ${ADMIN_BOOTSTRAP_ENABLED:false}

logging:
  level:
    root: INFO
    com.investrocket: INFO
    org.springframework.security: WARN

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
