spring:
  application:
    name: invest-rocket-backend
  profiles:
    default: dev
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true

server:
  port: ${PORT:${SERVER_PORT:8080}}

app:
  cors:
    allowed-origin: ${FRONTEND_URL:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  financial-api:
    provider: ${FINANCIAL_API_PROVIDER:mock}
    finnhub-api-key: ${FINNHUB_API_KEY:${FINANCIAL_API_KEY:}}
    twelve-data-api-key: ${TWELVE_DATA_API_KEY:}
    finnhub-base-url: ${FINNHUB_BASE_URL:https://finnhub.io/api/v1}
    twelve-data-base-url: ${TWELVE_DATA_BASE_URL:https://api.twelvedata.com}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    auth-login-per-minute: ${RATE_LIMIT_AUTH_LOGIN_PER_MINUTE:5}
    auth-register-per-minute: ${RATE_LIMIT_AUTH_REGISTER_PER_MINUTE:3}
    market-quote-per-minute: ${RATE_LIMIT_MARKET_QUOTE_PER_MINUTE:30}
    market-search-per-minute: ${RATE_LIMIT_MARKET_SEARCH_PER_MINUTE:20}
    orders-per-minute: ${RATE_LIMIT_ORDERS_PER_MINUTE:20}
    watchlist-per-minute: ${RATE_LIMIT_WATCHLIST_PER_MINUTE:60}
    default-per-minute: ${RATE_LIMIT_DEFAULT_PER_MINUTE:120}
    finnhub-per-minute: ${FINNHUB_RATE_LIMIT_PER_MINUTE:50}
    twelve-data-per-minute: ${TWELVE_DATA_RATE_LIMIT_PER_MINUTE:8}
  pending-order-processor:
    enabled: ${PENDING_ORDER_PROCESSOR_ENABLED:true}
    interval-ms: ${PENDING_ORDER_PROCESSOR_INTERVAL_MS:30000}
  live-price-stream:
    enabled: ${LIVE_PRICE_STREAM_ENABLED:true}
    interval-ms: ${LIVE_PRICE_STREAM_INTERVAL_MS:5000}
  portfolio-snapshot:
    enabled: ${PORTFOLIO_SNAPSHOT_ENABLED:true}
    interval-ms: ${PORTFOLIO_SNAPSHOT_INTERVAL_MS:300000}
  admin-bootstrap:
    enabled: ${ADMIN_BOOTSTRAP_ENABLED:false}
    email: ${ADMIN_EMAIL:}
    password: ${ADMIN_PASSWORD:}
    full-name: ${ADMIN_FULL_NAME:Invest Rocket Admin}
  price-alert-processor:
    enabled: ${PRICE_ALERT_PROCESSOR_ENABLED:true}
    interval-ms: ${PRICE_ALERT_PROCESSOR_INTERVAL_MS:15000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
