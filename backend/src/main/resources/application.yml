spring:
  application:
    name: invest-rocket-backend
  profiles:
    default: dev
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origin: ${FRONTEND_URL:http://localhost:5173}
  financial-api:
    provider: ${FINANCIAL_API_PROVIDER:finnhub}
    api-key: ${FINANCIAL_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
