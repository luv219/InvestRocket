services:
  backend:
    build:
      context: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      FINANCIAL_API_PROVIDER: ${FINANCIAL_API_PROVIDER:-mock}
      FINANCIAL_API_KEY: ${FINANCIAL_API_KEY:-}
      PENDING_ORDER_PROCESSOR_ENABLED: ${PENDING_ORDER_PROCESSOR_ENABLED:-true}
      PENDING_ORDER_PROCESSOR_INTERVAL_MS: ${PENDING_ORDER_PROCESSOR_INTERVAL_MS:-30000}
      LIVE_PRICE_STREAM_ENABLED: ${LIVE_PRICE_STREAM_ENABLED:-true}
      LIVE_PRICE_STREAM_INTERVAL_MS: ${LIVE_PRICE_STREAM_INTERVAL_MS:-5000}
      PORTFOLIO_SNAPSHOT_ENABLED: ${PORTFOLIO_SNAPSHOT_ENABLED:-true}
      PORTFOLIO_SNAPSHOT_INTERVAL_MS: ${PORTFOLIO_SNAPSHOT_INTERVAL_MS:-300000}
      PRICE_ALERT_PROCESSOR_ENABLED: ${PRICE_ALERT_PROCESSOR_ENABLED:-true}
      PRICE_ALERT_PROCESSOR_INTERVAL_MS: ${PRICE_ALERT_PROCESSOR_INTERVAL_MS:-15000}
      ADMIN_BOOTSTRAP_ENABLED: ${ADMIN_BOOTSTRAP_ENABLED:-false}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:-Invest Rocket Admin}
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-ws://localhost:8080/ws}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
